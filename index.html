<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Port Terminate</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="titlebar">
        <div class="drag-region">Port Blocker Pro</div>
    </div>

    <main class="app-container">
        <!-- Sidebar or Header panel -->
        <header class="hero-section">
            <div class="hero-content">
                <div class="branding">
                    <div class="logo-box">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM17 13H7V11H17V13Z" fill="currentColor"/>
                        </svg>
                    </div>
                    <h1>Port Terminate</h1>
                </div>
                <p class="subtitle">Quickly clear busy ports for your dev environments.</p>
                
                <div class="stats-row">
                    <div class="stat-card">
                        <span class="stat-value" id="user-ports-count">0</span>
                        <span class="stat-label">Active App Ports</span>
                    </div>
                    <div class="stat-card system-stat">
                        <span class="stat-value" id="system-ports-count">0</span>
                        <span class="stat-label">System Protected</span>
                    </div>
                </div>

                <div class="action-row">
                    <button class="btn-primary" id="refresh-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 4v6h-6"></path>
                            <path d="M1 20v-6h6"></path>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                        Refresh List
                    </button>
                    <div class="search-box">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" id="search-input" placeholder="Search ports or apps...">
                    </div>
                </div>
            </div>
            
            <!-- Animated background elements inside hero -->
            <div class="glow-orb orb-1"></div>
            <div class="glow-orb orb-2"></div>
        </header>

        <section class="ports-list-section">
            <div class="list-header">
                <h2>Listening Ports</h2>
                <div class="legend">
                    <span class="legend-item"><span class="dot developer"></span> Developer Apps</span>
                    <span class="legend-item"><span class="dot system"></span> System Services</span>
                </div>
            </div>

            <div class="ports-grid" id="ports-grid">
                <!-- Port slots will be injected here via JS -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Scanning active network ports...</p>
                </div>
            </div>
        </section>
    </main>

    <div class="toast-container" id="toast-container"></div>

    <script src="renderer.js"></script>
</body>
</html>
